<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#111;
      font-family:Arial;
    }

    .box{
      width:700px;
      height:400px;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      box-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    .box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Name Style */
    .title{
      position:absolute;
      top:20px;
      left:20px;

      background:rgba(0,0,0,0.5);
      color:white;

      padding:10px 20px;
      border-radius:10px;

      font-size:28px;
      font-weight:bold;

      z-index:10;
    }

  </style>
</head>

<body>

  <div class="box">

    <!-- Place Name -->
    <div class="title">🇫🇷 Paris</div>

    <!-- Image -->
    <img id="slider"
    src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1400">

  </div>

 <script>

  $(function () {

    let photos = [

      "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1400",

      "https://images.unsplash.com/photo-1573843981267-be1999ff37cd?w=1400",

      "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1400",

      "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1400",

      "https://images.unsplash.com/photo-1492571350019-22de08371fd3?w=1400"
    ];

    let places = [

      "🇫🇷 Paris",
      "🏝 Maldives",
      "🌆 Dubai",
      "🏔 Switzerland",
      "🌸 Japan"

    ];

    let i = 0;

    setInterval(function () {

      i++;

      if(i >= photos.length){
        i = 0;
      }

      $("#slider").fadeOut(500, function () {

        $(this)
          .attr("src", photos[i])
          .fadeIn(500);

      });

      $(".title")
        .hide()
        .html(places[i])
        .fadeIn(500);

    }, 2000);

  });

</script>

</body>
</html>
